workflows:
  ios-workflow:
    name: LifeVault iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      # Variables added in the Codemagic dashboard ("Environment variables"
      # -> encrypted) live inside named variable groups. They are NOT injected
      # into build scripts automatically -- the workflow must list the group(s)
      # here so Codemagic exports them into every script step.
      #
      # "Default" and "Default1" are the groups Codemagic creates by default.
      # If you stored the Supabase vars in a differently-named group, add that
      # name to this list. Do NOT redeclare the vars below with empty values --
      # Codemagic's validator rejects empty-string entries and the group import
      # already exports them into the build environment.
      groups:
        - Default
        - Default1
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aliomer.lifevault
      node: latest
      xcode: latest

    scripts:
      - name: Install Bun
        script: |
          # This project uses bun as its package manager (bun.lock is the
          # source of truth). Install bun into the CI environment so every
          # subsequent step can use it instead of npm.
          export BUN_INSTALL="$HOME/.bun"
          if ! command -v bun >/dev/null 2>&1; then
            curl -fsSL https://bun.sh/install | bash
          fi
          # Codemagic persists env vars across scripts by reading KEY=value
          # lines from $CM_ENV and exporting them into every following step.
          # We must expand $BUN_INSTALL and $PATH *now* (at write time) so
          # the literal resolved paths are stored, not the variable names.
          RESOLVED_PATH="$BUN_INSTALL/bin:$PATH"
          echo "BUN_INSTALL=$BUN_INSTALL" >> "$CM_ENV"
          echo "PATH=$RESOLVED_PATH" >> "$CM_ENV"
          # Also export for this same script, then verify bun is callable.
          export PATH="$RESOLVED_PATH"
          bun --version
          echo "Bun installed at $(command -v bun)"

      - name: Verify required environment variables
        script: |
          set -e
          # The web app reads Supabase credentials via Vite env vars:
          #   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
          # These MUST be present at build time so Vite inlines them into
          # the bundle (import.meta.env.VITE_*). Add them in the Codemagic
          # dashboard under "Environment variables" (encrypted), inside a
          # variable group named "Default" (or add your group name to the
          # environment.groups list above).
          echo "--- Resolving Supabase env vars from Codemagic environment ---"
          # Use printenv to read straight from the process environment that
          # Codemagic populated after importing the variable group(s). This
          # avoids shell-expansion quirks and shows exactly what the build
          # sees.
          URL_VAL="$(printenv VITE_SUPABASE_URL || true)"
          KEY_VAL="$(printenv VITE_SUPABASE_ANON_KEY || true)"
          echo "VITE_SUPABASE_URL      : ${URL_VAL:+present (len ${#URL_VAL})}${URL_VAL:-MISSING}"
          echo "VITE_SUPABASE_ANON_KEY : ${KEY_VAL:+present (len ${#KEY_VAL})}${KEY_VAL:-MISSING}"
          if [ -z "$URL_VAL" ] || [ -z "$KEY_VAL" ]; then
            echo ""
            echo "ERROR: One or both Supabase env vars are not visible to this build."
            echo "Troubleshooting checklist:"
            echo "  1. In Codemagic dashboard → Environment variables, confirm both"
            echo "     VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY are saved as"
            echo "     encrypted values."
            echo "  2. Confirm they belong to a variable group named \"Default\""
            echo "     (or update environment.groups in codemagic.yaml to match"
            echo "     your group name)."
            echo "  3. Confirm the group is shared with this app/workflow."
            echo "  4. Re-run the build. Dashboard edits take effect on the next build."
            echo ""
            echo "If you intentionally want a build WITHOUT cloud backup, remove"
            echo "this verification step and the vars: block in codemagic.yaml."
            exit 1
          fi
          echo "OK: Both Supabase env vars are present in the build environment."

      - name: Install dependencies
        script: |
          set -e
          echo "Using bun: $(command -v bun)"
          bun --version
          cd web
          bun install --frozen-lockfile

      - name: Build web app
        script: |
          set -e
          cd web
          # Vite inlines VITE_* vars from process.env at build time, so the
          # Supabase vars imported via the Codemagic variable group are picked
          # up automatically. We ALSO write them into web/.env so any local
          # tooling that reads .env (and Vite's own .env loader) sees them,
          # and so the build is reproducible regardless of how Vite resolves
          # its env precedence.
          if [ -n "$VITE_SUPABASE_URL" ] && [ -n "$VITE_SUPABASE_ANON_KEY" ]; then
            # Rewrite the two Supabase lines (idempotent) — remove any stale
            # entries first, then append fresh values. This guarantees the
            # file always reflects the current dashboard values.
            touch .env
            sed -i '' '/^VITE_SUPABASE_URL=/d; /^VITE_SUPABASE_ANON_KEY=/d' .env || true
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
            echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
            echo "Wrote Supabase vars to web/.env"
          else
            echo "WARNING: Supabase vars empty; building without cloud backup."
          fi
          bun run build

      - name: Create and sync iOS project
        script: |
          set -e
          cd web
          if [ ! -d "ios" ]; then
            bunx cap add ios
          fi
          bunx cap sync ios

          # Inject camera, photo library & Face ID permission strings into the
          # generated iOS Info.plist. Capacitor's Camera plugin requires
          # ALL THREE keys to be present, otherwise iOS terminates the app
          # with: "crashed because it attempted to access privacy-sensitive
          # data without a usage description." This is a hard crash, not a
          # warning, so every key must be set before the IPA is built.
          # The camera is used by both the profile photo picker and the AI
          # document scanner. The photo library is used only by the profile
          # photo picker (AI scan is camera-only for now).
          # Face ID is used by the Security page's biometric app lock.
          #
          # Inject the privacy usage strings into the FINAL Info.plist that
          # will be archived into the IPA. We already `cd web` above, so the
          # correct relative path is ios/App/App/Info.plist (NOT web/ios/...).
          # Using the wrong path silently no-op'd every PlistBuddy call and
          # shipped an IPA with no NSPhotoLibraryUsageDescription, which Apple
          # rejected with error 90683. We now hard-verify each key is present.
          PLIST="ios/App/App/Info.plist"
          if [ ! -f "$PLIST" ]; then
            echo "ERROR: Info.plist not found at $PLIST after cap sync"
            ls -la ios/App/App/ 2>/dev/null || true
            exit 1
          fi
          set_perm() {
            local key="$1" value="$2"
            # Set overwrites if the key exists; Add creates it on first build.
            if /usr/libexec/PlistBuddy -c "Set :$key $value" "$PLIST" 2>/dev/null; then
              return 0
            fi
            /usr/libexec/PlistBuddy -c "Add :$key string $value" "$PLIST"
          }
          set_perm :NSCameraUsageDescription \
            'LifeVault uses the camera to take a profile photo and scan documents with AI.'
          set_perm :NSPhotoLibraryUsageDescription \
            'LifeVault requires access to your photo library so users can choose a profile picture or import document images.'
          set_perm :NSPhotoLibraryAddUsageDescription \
            'LifeVault may save profile photos to your photo library.'
          set_perm :NSFaceIDUsageDescription \
            'LifeVault uses Face ID to unlock the app and protect your documents.'

          # Hard verification: fail the build loudly if any required privacy
          # key is missing from the final Info.plist. This makes it impossible
          # to ship another App Store-rejected IPA due to a silent no-op.
          echo "--- Verifying privacy keys in $PLIST ---"
          for key in NSCameraUsageDescription NSPhotoLibraryUsageDescription NSPhotoLibraryAddUsageDescription NSFaceIDUsageDescription; do
            if /usr/libexec/PlistBuddy -c "Print :$key" "$PLIST" >/dev/null 2>&1; then
              echo "OK  : $key = $(/usr/libexec/PlistBuddy -c "Print :$key" "$PLIST")"
            else
              echo "FAIL: $key is MISSING from $PLIST"
              exit 1
            fi
          done
          echo "--- All required privacy keys present in final Info.plist ---"

      - name: Set version and build number
        script: |
          cd web/ios/App
          agvtool new-marketing-version 1.0
          # Secure cloud backup & sync feature added; bump to 6 for the
          # next App Store Connect upload.
          agvtool new-version -all 6

      - name: Apply iOS signing
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/web/ios/App/App.xcodeproj" \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration