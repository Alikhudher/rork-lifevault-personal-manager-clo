workflows:
  ios-workflow:
    name: LifeVault iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aliomer.lifevault
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          cd web
          npm ci

      - name: Build web app
        script: |
          cd web
          npm run build

      - name: Create and sync iOS project
        script: |
          cd web
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Set version and build number
        script: |
          cd web/ios/App
          agvtool new-marketing-version 1.0
          agvtool new-version -all 2

      - name: Apply iOS signing
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/web/ios/App/App.xcodeproj" \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration