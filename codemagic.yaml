workflows:
  ios-workflow:
    name: LifeVault iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aliomer.lifevault
      node: latest
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          cd web
          npm ci

      - name: Build web app
        script: |
          cd web
          npm run build

      - name: Create and sync iOS project
        script: |
          cd web
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

          # Inject camera & photo library permission strings into the
          # generated iOS Info.plist. Capacitor's Camera plugin requires
          # ALL THREE keys to be present, otherwise iOS terminates the app
          # with: "crashed because it attempted to access privacy-sensitive
          # data without a usage description." This is a hard crash, not a
          # warning, so every key must be set before the IPA is built.
          # The camera is used by both the profile photo picker and the AI
          # document scanner. The photo library is used only by the profile
          # photo picker (AI scan is camera-only for now).
          PLIST="web/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'LifeVault uses the camera to take a profile photo and scan documents with AI.'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'LifeVault uses your photo library to choose a profile photo.'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'LifeVault may save profile photos to your photo library.'" "$PLIST" 2>/dev/null || true

      - name: Set version and build number
        script: |
          cd web/ios/App
          agvtool new-marketing-version 1.0
          agvtool new-version -all 2

      - name: Apply iOS signing
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/web/ios/App/App.xcodeproj" \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration